- name: create rebitmq server
  hosts: rabbitmq
  become: yes
  tasks:
   - name: Copy rabbitmq repo
     ansible.builtin.copy:
       src: rabitmq.repo
       dest: /etc/yum.repos.d/rabbitmq.repo

   - name: install rabbitmq server
     ansible.builtin.package:
       name: rabbitmq-server
       state: present

   - name: start and enable rabbitmq server
     ansible.builtin.service:
      name: rabbitmq-server
      state: started
      enabled: yes

   - name: create and provide permissions to user #ansible rabbitmq will help here to add user and set permissions.
     community.rabbitmq.rabbitmq_user:
      user: roboshop
      password: roboshop123
      permissions:
        - vhost: /
          configure_priv: .*
          read_priv: .*
          write_priv: .*
      state: present
     


